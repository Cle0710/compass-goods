<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コンパスグッズ管理</title>

<style>
#hero-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.hero-button{
  padding:12px;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:8px;
  background:white;
}
</style>

</head>
<body>

<div id="goods-list"></div>

document.getElementById("hero-list").innerHTML =

    <button class="hero-button">
      ${hero.name}
    </button>
  `).join("");

document.getElementById("goods-list").innerHTML =
  goods.map(item => {
    const tags = item.heroTags
      .map(id => heroes.find(hero => hero.id === id)?.name)
      .join("、");

    return `
      <div>
        <b>${item.name}</b><br>
        タグ: ${tags}
      </div>
      <hr>
    `;
  }).join("");
</script>

</body>
</html>

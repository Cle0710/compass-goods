<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コンパスグッズ管理</title>

<style>
#hero-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.hero-button{
  padding:16px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
}

#all-heroes-button{
  width:100%;
  padding:14px;
  font-size:18px;
  font-weight:bold;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
  color:black;
  margin-bottom:10px;
}

.selected-hero{
  background:#ff9800;
  color:white;
  font-weight:bold;
}

#all-heroes-button.selected-hero{
  background:#ff9800;
  color:white;
}

</style>

</head>
<body>

<h1>コンパスグッズ管理</h1>

<details>

  <summary>ヒーローで探す</summary>

  <button
    id="all-heroes-button"
    class="selected-hero"
    onclick="showAllHeroes()"
  >
    全ヒーロー
  </button>

  <div id="hero-list"></div>

</details>

<hr>

<details open>

  <summary>シリーズ情報</summary>

  <h2 id="series-name"></h2>

  <p>発売日: <span id="release-date"></span></p>
  <p>価格: <span id="price"></span>円</p>
  <p>商品コード: <span id="jan-code"></span></p>
</details>

<hr>

<h2>グッズ一覧</h2>

<p id="selected-hero">
全ヒーロー表示中
</p>

<p id="goods-count">
0件
</p>

<div id="goods-list"></div>

<hr>

<h2>グッズ詳細</h2>

<div id="goods-detail">
グッズを選択してください
</div>

<script>

const series = {
  id: "0001",
  name: "#コンパス 戦闘摂理解析システム トレーディングカード付きウエハース",
  releaseDate: "2026/05/09",
  price: 290,
  janCode: "4573668402579"
};

const heroes = [
  { id: 1, name: "十文字 アタリ" },
  { id: 2, name: "ジャスティス ハンコック" },
  { id: 3, name: "リリカ" },
  { id: 4, name: "双挽 乃保" },
  { id: 5, name: "桜華 忠臣" },
  { id: 6, name: "ジャンヌ ダルク" },
  { id: 7, name: "マルコス'55" },
  { id: 8, name: "ルチアーノ" },
  { id: 9, name: "Voidoll" },
  { id: 10, name: "深川 まとい" },
  { id: 11, name: "グスタフ ハイドリヒ" },
  { id: 12, name: "ニコラ テスラ" },
  { id: 13, name: "ヴィオレッタ ノワール" },
  { id: 14, name: "コクリコット ブランシュ" },
  { id: 15, name: "マリア＝S＝レオンブルク" },
  { id: 16, name: "アダム＝ユーリエフ" },
  { id: 17, name: "13†サーティーン†" },
  { id: 18, name: "かけだし勇者" },
  { id: 19, name: "メグメグ" },
  { id: 20, name: "イスタカ" },
  { id: 21, name: "輝龍院 きらら" },
  { id: 22, name: "ヴィーナス ポロロッチョ" },
  { id: 23, name: "ソーン＝ユーリエフ" },
  { id: 24, name: "デビルミント鬼龍 デルミン" },
  { id: 25, name: "トマス" },
  { id: 26, name: "零夜" },
  { id: 27, name: "ルルカ" },
  { id: 28, name: "ピエール 77世" },
  { id: 29, name: "狐ヶ咲 甘色" },
  { id: 30, name: "HM-WA100 ニーズヘッグ" },
  { id: 31, name: "ゲームバズーカガール" },
  { id: 32, name: "青春 アリス" },
  { id: 33, name: "イグニス＝ウィル＝ウィスプ" },
  { id: 34, name: "糸廻 輪廻" },
  { id: 35, name: "Bugdoll" },
  { id: 36, name: "ステリア・ララ・シルワ" },
  { id: 37, name: "ラヴィ・シュシュマルシュ" },
  { id: 38, name: "アル・ダハブ＝アルカティア" },
  { id: 39, name: "天空王 ぶれいずどらごん" },
  { id: 40, name: "某〈なにがし〉" },
  { id: 41, name: "クー・シー" },
  { id: 42, name: "アミスター＝バランディン" },
  { id: 43, name: "鬼ヶ式 うら" },
  { id: 44, name: "コラプス" },
  { id: 45, name: "みりぽゆ" },
  { id: 46, name: "チーちゃん" },
  { id: 47, name: "ペルリニエ" },
  { id: 48, name: "メルーニャ" },
  { id: 49, name: "†ファースト†" },
  { id: 50, name: "シャルル・リヒター" }
];

const goods = [
  {
  id: "0001-01",
  name: "ウエハースカード 十文字アタリ",
  type: "カード",
  seriesId: "0001",
  heroTags: [1]
  },

  {
    id: "0001-02",
    name: "ウエハースカードホロ 十文字アタリ",
    type: "カード",
    seriesId: "0001",
    heroTags: [1]
  },
  {
    id: "0001-03",
    name: "ウエハース特典アタリ,ジャスティス,リリカ,乃保",
    type: "カード",
    seriesId: "0001",
    heroTags: [1, 2, 3, 4]
  }
];

let storedCounts =
  JSON.parse(
    localStorage.getItem("storedCounts")
  ) || {};

let displayedCounts =
  JSON.parse(
    localStorage.getItem("displayedCounts")
  ) || {};

let selectedHeroId = null;

function saveCounts(){

  localStorage.setItem(
    "storedCounts",
    JSON.stringify(storedCounts)
  );

  localStorage.setItem(
    "displayedCounts",
    JSON.stringify(displayedCounts)
  );

}

document.getElementById("series-name").textContent = series.name;
document.getElementById("release-date").textContent = series.releaseDate;
document.getElementById("price").textContent = series.price;
document.getElementById("jan-code").textContent = series.janCode;

document.getElementById("hero-list").innerHTML =
  heroes.map(hero => `
    <button
      id="hero-${hero.id}"
      class="hero-button"
      onclick="selectHero(${hero.id})"
    >
      ${hero.name}
    </button>
  `).join("");

function renderGoods() {

const filteredGoods =
  selectedHeroId === null
    ? goods
    : goods.filter(item =>
        item.heroTags.includes(selectedHeroId)
      );

document.getElementById("goods-count").textContent =
  filteredGoods.length + "件";

document.getElementById("goods-list").innerHTML =
    filteredGoods.map(item => {

      const tags = item.heroTags
        .map(id => heroes.find(hero => hero.id === id)?.name)
        .join("、");

      return `
        <div
          onclick="showGoodsDetail('${item.id}')"
          style="
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:8px;
            cursor:pointer;
          "
        >

          <b>${item.name}</b><br>
          対象ヒーロー: ${tags}

        </div>
      `;

    }).join("");
}

function selectHero(heroId) {

  selectedHeroId = heroId;

  document
    .querySelectorAll(".hero-button")
    .forEach(button =>
      button.classList.remove("selected-hero")
    );

document
  .getElementById(`hero-${heroId}`)
  .classList.add("selected-hero");

document
  .getElementById("all-heroes-button")
  .classList.remove("selected-hero");

  const hero =
    heroes.find(h => h.id === heroId);

  document.getElementById("selected-hero").textContent =
    hero.name + " のグッズ";

  renderGoods();
}

function showAllHeroes() {

  selectedHeroId = null;

  document
    .querySelectorAll(".hero-button")
    .forEach(button =>
      button.classList.remove("selected-hero")
    );

  document
    .getElementById("all-heroes-button")
    .classList.add("selected-hero");

  document.getElementById("selected-hero").textContent =
    "全ヒーロー表示中";

  renderGoods();
}

function showGoodsDetail(goodsId) {

  const item =
    goods.find(g => g.id === goodsId);

  const heroNames =
    item.heroTags
      .map(id =>
        heroes.find(h => h.id === id)?.name
      )
      .join("、");

  const goodsSeries = series;

  const stored =
    storedCounts[item.id] || 0;

  const displayed =
    displayedCounts[item.id] || 0;

  const total =
    stored + displayed;

  document.getElementById("goods-detail").innerHTML =
    `
    <h3>${item.name}</h3>

    <p><b>種類</b><br>${item.type}</p>

    <p><b>シリーズ</b><br>${goodsSeries.name}</p>

    <p><b>発売日</b><br>${goodsSeries.releaseDate}</p>

    <p><b>価格</b><br>${goodsSeries.price}円</p>

    <p><b>対象ヒーロー</b><br>${heroNames}</p>

    <p><b>保管数</b></p>

    <p><b>所持数</b><br>${total}</p>

    <div
      style="
        display:flex;
        gap:8px;
        align-items:center;
      "
    >

      <button
        onclick="changeStoredCount('${item.id}',1)"
      >
        −
      </button>

      <input
        type="number"
        min="0"
        value="${stored}"
        onchange="updateStoredCount('${item.id}',this.value)"
        style="
          width:70px;
          text-align:center;
        "
      >

      <button
        onclick="changeStoredCount('${item.id}',-1)"
      >
        ＋
      </button>

    </div>

    `;
}

function changeStoredCount(goodsId, amount){

  storedCounts[goodsId] =
    Math.max(
      0,
      (storedCounts[goodsId] || 0)
      + amount
    );

  saveCounts();

  showGoodsDetail(goodsId);

}

function updateStoredCount(goodsId,value){

  storedCounts[goodsId] =
    Math.max(
      0,
      Number(value) || 0
    );

  saveCounts();

  showGoodsDetail(goodsId);

}

renderGoods();

</script>

</body>
</html>
